name: Format Caffeine import fix

on:
  push:
    branches: [codex/fix-caffeine-biome-import]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-caffeine-biome-import
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm fix
      - name: Commit formatter changes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/frontend/src
          git diff --cached --quiet || git commit -m "Apply Biome fixes"
          git push
