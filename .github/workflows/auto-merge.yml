name: Auto-merge trusted fixes

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.owner.login == github.repository_owner &&
      (startsWith(github.event.workflow_run.head_branch, 'codex/') ||
       startsWith(github.event.workflow_run.head_branch, 'claude/'))
    runs-on: ubuntu-latest
    steps:
      - name: Merge pull request into main
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          test -n "$PR_NUMBER"
          gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json baseRefName --jq '.baseRefName == "main"' | grep true
          gh pr merge "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --squash --delete-branch
